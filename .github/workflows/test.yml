name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 5m ./...

      - name: qa-runner (synthetic corpus)
        run: |
          go run ./cmd/qa-runner -corpus synthetic -out qa-report.json
          jq '.cells, .elapsed_ms' qa-report.json

      - name: aecdump-replay (build only)
        run: go build ./cmd/aecdump-replay

      - name: upload qa-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.sha }}
          path: qa-report.json
          retention-days: 14
