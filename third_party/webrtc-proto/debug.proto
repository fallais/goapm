// Verbatim copy of WebRTC's modules/audio_processing/debug.proto, used by
// audioproc_f to log APM input/output frames and configuration events.
//
// Source: https://webrtc.googlesource.com/src/+/refs/heads/main/modules/audio_processing/debug.proto
// See ./PINNED_COMMIT for the exact upstream SHA this file was taken at.
//
// LICENSE: BSD 3-Clause (WebRTC). See https://webrtc.googlesource.com/src/+/refs/heads/main/LICENSE

syntax = "proto2";

option optimize_for = LITE_RUNTIME;
package webrtc.audioproc;

// Information about an APM creation. Sent once at the start of every
// .aecdump file.
message Init {
  optional int32 sample_rate = 1;
  optional int32 device_sample_rate = 2 [deprecated = true];
  optional int32 num_input_channels = 3;
  optional int32 num_output_channels = 4;
  optional int32 num_reverse_channels = 5;
  optional int32 reverse_sample_rate = 6;
  optional int32 output_sample_rate = 7;
  optional int32 num_reverse_output_channels = 8;
  optional int64 timestamp_ms = 9;
}

// One 10 ms render-side (far-end) frame.
message ReverseStream {
  // Legacy interleaved data: int16 samples, native endianness. Deprecated
  // in favor of per-channel float32 data.
  optional bytes data = 1;
  // Per-channel float32 samples, little-endian.
  repeated bytes channel = 2;
}

// One 10 ms capture-side (near-end) frame.
message Stream {
  // Legacy interleaved int16 capture data.
  optional bytes input_data = 1;
  // Legacy interleaved int16 output data.
  optional bytes output_data = 2;
  // Reported round-trip stream delay (ms).
  optional int32 delay = 3;
  optional sint32 drift = 4;
  optional int32 level = 5;
  optional bool keypress = 6;
  // Per-channel float32 input and output data, little-endian.
  repeated bytes input_channel = 7;
  repeated bytes output_channel = 8;
  optional float applied_input_volume = 9;
}

// Mutable config snapshot. Emitted whenever a runtime config changes.
message Config {
  optional bool aec_enabled = 1;
  optional bool aec_delay_agnostic_enabled = 2;
  optional bool aec_drift_compensation_enabled = 3;
  optional bool aec_extended_filter_enabled = 4;
  optional int32 aec_suppression_level = 5;
  optional bool aecm_enabled = 6;
  optional bool aecm_comfort_noise_enabled = 7;
  optional int32 aecm_routing_mode = 8;
  optional bool agc_enabled = 9;
  optional int32 agc_mode = 10;
  optional bool agc_limiter_enabled = 11;
  optional bool hpf_enabled = 12;
  optional bool ns_enabled = 13;
  optional int32 ns_level = 14;
  optional bool transient_suppression_enabled = 15;
  optional bool pre_amplifier_enabled = 16;
  optional float pre_amplifier_fixed_gain_factor = 17;
  optional string experiments_description = 18;
}

// A wrapper around the above. Each event in an .aecdump file is one of
// these, serialized and length-prefixed with a 4-byte little-endian
// length.
message Event {
  enum Type {
    INIT = 0;
    REVERSE_STREAM = 1;
    STREAM = 2;
    CONFIG = 3;
    UNKNOWN_EVENT = 4;
  }
  required Type type = 1;
  optional Init init = 2;
  optional ReverseStream reverse_stream = 3;
  optional Stream stream = 4;
  optional Config config = 5;
}
